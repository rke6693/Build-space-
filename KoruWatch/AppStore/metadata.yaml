app_name: "Koru — Wellness Score"
subtitle: "Your body, one number."
bundle_id: "app.koru.watch"
category: "Health & Fitness"
secondary_category: "Lifestyle"
content_rating: "4+"
price_tier: 0  # free, or set to paid

# ---- Description --------------------------------------------------------
# Character limit: 4,000. Write for scanners, not readers.

description: |
  Wake up. Glance at your wrist. One number tells you how ready you are.

  Koru distills ten HealthKit signals — HRV, resting heart rate, sleep stages, activity rings, workout load, VO2 max, SpO2, respiratory rate, wrist temperature, and mindfulness — into a single 0–100 daily wellness score that's 100% private, 100% on your watch.

  DESIGNED FOR ULTRA 2 & SERIES 9
  • Action Button on Ultra 2 opens an instant mood/energy/stress check-in
  • Double Tap on Series 9 does the same — one gesture, three data points
  • Night Mode preserves dark adaptation with a red-on-black palette
  • Size-adaptive layouts for 41mm, 45mm, and 49mm displays

  YOUR SCORE, EXPLAINED
  • Score ring fills with an aurora gradient (teal → violet → coral) that shifts with your state
  • Crown-scroll through Score → 7-Day Trend → Top Contributors → Calendar Heatmap
  • Tap any contributor to see its 7-day sparkline, baseline comparison, and what it means
  • Personalized insights powered by 8 pattern detectors, not canned text

  BASELINE THAT LEARNS
  Day 1: population norms give you a usable score immediately.
  Day 14: fully personalized to YOUR heart, YOUR sleep, YOUR rhythm.
  The transition is invisible — your score just gets smarter.

  RETENTION WITHOUT ADDICTION
  • Morning summary notification with yesterday's score
  • Recovery alerts when your body needs an easy day
  • Weekly reviews with your best day, worst day, and top improving metric
  • Milestone celebrations: first score, personal best, 7/14/30-day streaks
  • No social feed. No leaderboard. No dark patterns. Just your data.

  PRIVACY FIRST
  • Zero network calls. No iCloud. No analytics. No telemetry.
  • All data stored with complete file protection — encrypted at rest.
  • HealthKit raw samples never leave the device.
  • Not a medical device. Always consult a clinician for health concerns.

  Koru is the Maori spiral symbol for new growth and renewal. This app is a daily renewal of self-awareness — your body's story, told in one number.

