name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Stub values for build-time env validation.
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: test-secret-test-secret-test-secret
      DATABASE_URL: postgresql://user:pw@localhost/db
      STRIPE_SECRET_KEY: sk_test_stub
      STRIPE_WEBHOOK_SECRET: whsec_stub
      STRIPE_PRICE_PRO_MONTHLY: price_stub
      RUN_TOKEN_SECRET: test-run-token-secret-at-least-32-bytes-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: npm audit (prod only, fail on high)
        run: npm audit --omit=dev --audit-level=high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: true
