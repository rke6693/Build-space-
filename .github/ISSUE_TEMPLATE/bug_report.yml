name: Bug report
description: Something is broken or behaving wrong.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Quick reads, actionable repros, and version info help us close this fast.
  - type: input
    id: version
    attributes:
      label: Keel version
      placeholder: "v0.1.0 or commit hash"
    validations:
      required: true
  - type: input
    id: deployment
    attributes:
      label: How are you running Keel?
      placeholder: "Docker compose / Fly.io / bare Node / npm run dev / DEMO_MODE"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Smallest sequence of steps that reproduces the bug. Curl commands or code snippets are gold.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (with secrets redacted)
      render: text
  - type: input
    id: provider
    attributes:
      label: Provider involved (if any)
      placeholder: "anthropic / openai / both / n/a"
