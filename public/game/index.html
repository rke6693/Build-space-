<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Space Runner 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: env(safe-area-inset-top, 20px) 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    .score-box {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 8px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .score-box span {
      display: block;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }
    #lives { color: #ff6b6b; font-size: 20px; letter-spacing: 4px; }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,10,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 20;
      gap: 16px;
    }
    #overlay h1 {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 800;
      color: #fff;
      text-align: center;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    #overlay h1 span { color: #7c6ef5; }
    #overlay p {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }
    #overlay .final-score {
      font-size: 48px;
      font-weight: 800;
      color: #7c6ef5;
    }
    .btn {
      margin-top: 8px;
      padding: 16px 48px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #7c6ef5, #5a4fcf);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 8px 32px rgba(124,110,245,0.4);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(124,110,245,0.4); }

    #instructions {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 20px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
      padding-bottom: 8px;
    }

    #combo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffd700;
      font-size: 32px;
      font-weight: 800;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      text-shadow: 0 0 20px rgba(255,215,0,0.8);
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="score-box">SCORE<span id="scoreDisplay">0</span></div>
  <div class="score-box" style="text-align:right">BEST<span id="bestDisplay">0</span></div>
</div>
<div id="lives"></div>

<div id="combo"></div>
<div id="instructions">Swipe left/right to dodge · Tap to boost</div>

<div id="overlay">
  <h1>Space<br/><span>Runner 3D</span></h1>
  <p>Dodge obstacles and collect gems to survive as long as possible.</p>
  <button class="btn" id="startBtn">Play</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ── Constants ─────────────────────────────────────── */
const LANES = [-2.4, 0, 2.4];
const LANE_COUNT = 3;
const SPEED_BASE = 14;
const SPEED_MAX  = 40;
const SPEED_ACCEL = 0.3;
const SPAWN_INTERVAL_BASE = 1.4;
const GEM_INTERVAL = 1.1;

/* ── Scene ─────────────────────────────────────────── */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.FogExp2(0x050510, 0.018);

const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 200);
camera.position.set(0, 3.5, 9);
camera.lookAt(0, 0, -5);

/* ── Lights ────────────────────────────────────────── */
const ambient = new THREE.AmbientLight(0x111133, 0.8);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1.8);
sun.position.set(5, 10, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);

const purpleLight = new THREE.PointLight(0x7c6ef5, 3, 30);
purpleLight.position.set(0, 5, -10);
scene.add(purpleLight);

const blueLight = new THREE.PointLight(0x4488ff, 2, 20);
blueLight.position.set(-5, 3, 0);
scene.add(blueLight);

/* ── Track ─────────────────────────────────────────── */
const TRACK_LEN = 120;
const trackGeo = new THREE.PlaneGeometry(8, TRACK_LEN, 8, 60);
const trackMat = new THREE.MeshStandardMaterial({
  color: 0x0d0d2b,
  roughness: 0.8,
  metalness: 0.2,
  emissive: 0x0a0a1f,
});
const track = new THREE.Mesh(trackGeo, trackMat);
track.rotation.x = -Math.PI / 2;
track.position.z = -TRACK_LEN / 2 + 10;
track.receiveShadow = true;
scene.add(track);

// Lane lines
for (let i = -1; i <= 1; i++) {
  const lineGeo = new THREE.PlaneGeometry(0.04, TRACK_LEN);
  const lineMat = new THREE.MeshBasicMaterial({ color: 0x3333aa, transparent: true, opacity: 0.4 });
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.rotation.x = -Math.PI / 2;
  line.position.set(i * 2.4, 0.01, -TRACK_LEN / 2 + 10);
  scene.add(line);
}

// Side walls (glowing strips)
[-4.2, 4.2].forEach(x => {
  const wallGeo = new THREE.BoxGeometry(0.15, 0.5, TRACK_LEN);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x4444cc, emissive: 0x2222aa, emissiveIntensity: 0.6 });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.set(x, 0.25, -TRACK_LEN / 2 + 10);
  scene.add(wall);
});

/* ── Stars ─────────────────────────────────────────── */
const starGeo = new THREE.BufferGeometry();
const starCount = 600;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i += 3) {
  starPos[i]   = (Math.random() - 0.5) * 200;
  starPos[i+1] = Math.random() * 60 + 5;
  starPos[i+2] = (Math.random() - 0.5) * 200;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, sizeAttenuation: true });
scene.add(new THREE.Points(starGeo, starMat));

/* ── Player ────────────────────────────────────────── */
const playerGroup = new THREE.Group();
scene.add(playerGroup);

// Ship body
const bodyGeo = new THREE.ConeGeometry(0.45, 1.4, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xaaaaff, metalness: 0.7, roughness: 0.2, emissive: 0x3333aa, emissiveIntensity: 0.3 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.rotation.x = Math.PI / 2;
body.castShadow = true;
playerGroup.add(body);

// Wings
[-1, 1].forEach(side => {
  const wingGeo = new THREE.BoxGeometry(1.2, 0.08, 0.7);
  const wingMat = new THREE.MeshStandardMaterial({ color: 0x7c6ef5, metalness: 0.6, roughness: 0.3, emissive: 0x4444bb, emissiveIntensity: 0.4 });
  const wing = new THREE.Mesh(wingGeo, wingMat);
  wing.position.set(side * 0.7, 0, 0.2);
  wing.castShadow = true;
  playerGroup.add(wing);
});

// Engine glow
const engineGeo = new THREE.SphereGeometry(0.18, 8, 8);
const engineMat = new THREE.MeshStandardMaterial({ color: 0x00ccff, emissive: 0x00aaff, emissiveIntensity: 2, transparent: true, opacity: 0.9 });
const engine = new THREE.Mesh(engineGeo, engineMat);
engine.position.z = 0.75;
playerGroup.add(engine);

const engineLight = new THREE.PointLight(0x00aaff, 2, 5);
engine.add(engineLight);

playerGroup.position.set(0, 0.7, 7);

/* ── Particles (engine trail) ──────────────────────── */
const trailCount = 120;
const trailGeo = new THREE.BufferGeometry();
const trailPos = new Float32Array(trailCount * 3);
const trailVel = [];
const trailLife = new Float32Array(trailCount);
for (let i = 0; i < trailCount; i++) {
  trailPos[i*3] = trailPos[i*3+1] = trailPos[i*3+2] = 9999;
  trailLife[i] = 0;
  trailVel.push(new THREE.Vector3());
}
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
const trailMat = new THREE.PointsMaterial({ color: 0x00ccff, size: 0.18, transparent: true, opacity: 0.7, sizeAttenuation: true });
const trail = new THREE.Points(trailGeo, trailMat);
scene.add(trail);
let trailIdx = 0;

/* ── Obstacle pool ─────────────────────────────────── */
const obstaclePool = [];
const activeObstacles = [];

function makeObstacle() {
  const group = new THREE.Group();
  const types = ['box', 'ring', 'wall'];
  const t = types[Math.floor(Math.random() * types.length)];

  if (t === 'box') {
    const h = 0.6 + Math.random() * 1.2;
    const geo = new THREE.BoxGeometry(1.6, h, 1.0);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xaa1111, emissiveIntensity: 0.5, roughness: 0.4, metalness: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = h / 2;
    mesh.castShadow = true;
    group.add(mesh);
    group.userData.hitBox = new THREE.Vector3(0.7, h, 0.4);
  } else if (t === 'ring') {
    const geo = new THREE.TorusGeometry(0.9, 0.18, 8, 24);
    const mat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xcc3300, emissiveIntensity: 0.6 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 1.2;
    group.add(mesh);
    group.userData.isRing = true;
    group.userData.hitBox = new THREE.Vector3(0.6, 0.6, 0.2);
  } else {
    // Full-width wall with a gap
    const gap = Math.floor(Math.random() * LANE_COUNT);
    for (let l = 0; l < LANE_COUNT; l++) {
      if (l === gap) continue;
      const geo = new THREE.BoxGeometry(2.0, 1.8, 0.5);
      const mat = new THREE.MeshStandardMaterial({ color: 0xcc00ff, emissive: 0x880099, emissiveIntensity: 0.5 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(LANES[l], 0.9, 0);
      mesh.castShadow = true;
      group.add(mesh);
    }
    group.userData.isWall = true;
    group.userData.wallGap = gap;
  }
  return group;
}

/* ── Gem pool ──────────────────────────────────────── */
const activeGems = [];
const gemGeo = new THREE.OctahedronGeometry(0.28, 0);
const gemMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 1.2, metalness: 0.8, roughness: 0.1 });

function spawnGem(z) {
  const gem = new THREE.Mesh(gemGeo, gemMat);
  gem.position.set(LANES[Math.floor(Math.random() * LANE_COUNT)], 0.8, z);
  gem.castShadow = true;
  scene.add(gem);
  activeGems.push(gem);
}

/* ── Game state ────────────────────────────────────── */
let state = 'menu'; // 'menu' | 'playing' | 'dead'
let score = 0;
let best = parseInt(localStorage.getItem('srBest') || '0');
let lives = 3;
let speed = SPEED_BASE;
let lane = 1; // 0,1,2
let targetX = LANES[lane];
let elapsed = 0;
let nextObstacle = SPAWN_INTERVAL_BASE;
let nextGem = GEM_INTERVAL;
let invincible = 0;
let comboCount = 0;
let comboTimer = 0;
let shakeAmt = 0;
let boostActive = false;
let boostTimer = 0;

const scoreEl = document.getElementById('scoreDisplay');
const bestEl  = document.getElementById('bestDisplay');
const livesEl = document.getElementById('lives');
const overlay = document.getElementById('overlay');
const comboEl = document.getElementById('combo');

bestEl.textContent = best;

function updateLivesUI() {
  livesEl.textContent = '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3 - lives));
  livesEl.style.cssText = `position:fixed;top:${getTopOffset()}px;left:50%;transform:translateX(-50%);color:#ff6b6b;font-size:20px;letter-spacing:4px;pointer-events:none;z-index:10;`;
}

function getTopOffset() {
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sat') || '0') + 20;
}

let __runStartedAt = 0;
function startGame() {
  __runStartedAt = Date.now();
  try {
    window.parent.postMessage({ type: 'sr:run-started', at: __runStartedAt }, window.location.origin);
  } catch (_) { /* sandboxed standalone: ignore */ }
  score = 0; lives = 3; speed = SPEED_BASE; lane = 1;
  targetX = LANES[lane]; elapsed = 0;
  nextObstacle = SPAWN_INTERVAL_BASE; nextGem = GEM_INTERVAL;
  invincible = 0; comboCount = 0; comboTimer = 0;
  shakeAmt = 0; boostActive = false; boostTimer = 0;

  // Clear obstacles
  [...activeObstacles].forEach(o => { scene.remove(o); });
  activeObstacles.length = 0;
  [...activeGems].forEach(g => { scene.remove(g); });
  activeGems.length = 0;

  playerGroup.position.x = LANES[1];
  playerGroup.position.y = 0.7;
  overlay.style.display = 'none';
  state = 'playing';
  updateLivesUI();
}

function die() {
  if (invincible > 0) return;
  lives--;
  shakeAmt = 0.5;
  updateLivesUI();
  if (lives <= 0) {
    state = 'dead';
    if (score > best) { best = score; localStorage.setItem('srBest', best); }
    showDeathScreen();
  } else {
    invincible = 2.0;
  }
}

function showDeathScreen() {
  try {
    const durationMs = __runStartedAt ? Date.now() - __runStartedAt : 0;
    window.parent.postMessage(
      { type: 'sr:game-over', value: Math.max(0, Math.floor(score)), durationMs },
      window.location.origin,
    );
  } catch (_) { /* standalone: ignore */ }
  overlay.innerHTML = `
    <h1>Game <span>Over</span></h1>
    <div class="final-score">${score}</div>
    <p>Best: ${best}</p>
    <button class="btn" id="startBtn">Play Again</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').addEventListener('click', startGame, { once: true });
}

document.getElementById('startBtn').addEventListener('click', startGame, { once: true });

/* ── Input ─────────────────────────────────────────── */
let touchStartX = 0;
let touchStartY = 0;
let touchStartTime = 0;

window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();
}, { passive: true });

window.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartTime;

  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
    // Swipe
    if (dx > 0 && lane < 2) lane++;
    else if (dx < 0 && lane > 0) lane--;
    targetX = LANES[lane];
  } else if (Math.abs(dy) < 30 && dt < 200) {
    // Tap → boost
    boostActive = true;
    boostTimer = 1.5;
  }
}, { passive: true });

// Keyboard (desktop testing)
window.addEventListener('keydown', e => {
  if (state !== 'playing') return;
  if (e.key === 'ArrowLeft'  && lane > 0) { lane--; targetX = LANES[lane]; }
  if (e.key === 'ArrowRight' && lane < 2) { lane++; targetX = LANES[lane]; }
  if (e.key === ' ') { boostActive = true; boostTimer = 1.5; }
});

/* ── Resize ────────────────────────────────────────── */
function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
onResize();
window.addEventListener('resize', onResize);

/* ── Collision helpers ─────────────────────────────── */
const _pBox = new THREE.Box3();
const _oBox = new THREE.Box3();

function checkObstacleHit(obs) {
  const pd = playerGroup.position;
  _pBox.setFromCenterAndSize(pd, new THREE.Vector3(0.6, 0.8, 0.5));

  if (obs.userData.isWall) {
    const gap = obs.userData.wallGap;
    if (lane !== gap) {
      _oBox.setFromObject(obs);
      return _pBox.intersectsBox(_oBox);
    }
    return false;
  }

  if (obs.userData.isRing) {
    // Pass through centre = good (dodge)
    _oBox.setFromObject(obs);
    const overlap = _pBox.intersectsBox(_oBox);
    if (overlap) {
      const cx = obs.position.x;
      return Math.abs(pd.x - cx) > 0.55; // only hit rim
    }
    return false;
  }

  _oBox.setFromObject(obs);
  return _pBox.intersectsBox(_oBox);
}

/* ── Main loop ─────────────────────────────────────── */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (state === 'playing') {
    elapsed += dt;
    speed = Math.min(SPEED_BASE + elapsed * SPEED_ACCEL, SPEED_MAX);
    const curSpeed = boostActive ? speed * 1.6 : speed;

    // Score
    score = Math.floor(elapsed * 10 + comboCount * 5);
    scoreEl.textContent = score;

    // Timers
    if (invincible > 0) invincible -= dt;
    if (boostTimer > 0) { boostTimer -= dt; if (boostTimer <= 0) boostActive = false; }
    if (comboTimer > 0) { comboTimer -= dt; } else { comboCount = 0; }

    // Player lateral
    playerGroup.position.x += (targetX - playerGroup.position.x) * Math.min(1, dt * 14);

    // Ship tilt
    const tiltDir = Math.sign(targetX - playerGroup.position.x);
    playerGroup.rotation.z += (tiltDir * 0.25 - playerGroup.rotation.z) * dt * 8;
    playerGroup.rotation.x = -0.08;

    // Boost vertical bounce
    const floatY = 0.7 + Math.sin(elapsed * 3) * 0.06 + (boostActive ? 0.15 : 0);
    playerGroup.position.y += (floatY - playerGroup.position.y) * dt * 5;

    // Engine glow pulse
    engineMat.emissiveIntensity = 1.5 + Math.sin(elapsed * 15) * 0.5 + (boostActive ? 1 : 0);
    engineLight.intensity = 2 + Math.sin(elapsed * 12) * 0.5 + (boostActive ? 2 : 0);

    // Trail particles
    const pw = playerGroup.position;
    for (let i = 0; i < 3; i++) {
      const idx = trailIdx % trailCount;
      trailPos[idx*3]   = pw.x + (Math.random()-0.5)*0.2;
      trailPos[idx*3+1] = pw.y + (Math.random()-0.5)*0.2;
      trailPos[idx*3+2] = pw.z + 0.5 + Math.random()*0.3;
      trailVel[idx].set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.2, curSpeed * 0.06);
      trailLife[idx] = 0.4;
      trailIdx++;
    }
    for (let i = 0; i < trailCount; i++) {
      if (trailLife[i] > 0) {
        trailLife[i] -= dt;
        trailPos[i*3]   += trailVel[i].x * dt;
        trailPos[i*3+1] += trailVel[i].y * dt;
        trailPos[i*3+2] += trailVel[i].z * dt;
        if (trailLife[i] <= 0) { trailPos[i*3+2] = 9999; }
      }
    }
    trailGeo.attributes.position.needsUpdate = true;

    // Spawn obstacles
    nextObstacle -= dt;
    if (nextObstacle <= 0) {
      nextObstacle = Math.max(0.5, SPAWN_INTERVAL_BASE - elapsed * 0.004) + Math.random() * 0.3;
      const obs = makeObstacle();
      obs.position.z = -55;
      obs.position.x = LANES[Math.floor(Math.random() * LANE_COUNT)];
      scene.add(obs);
      activeObstacles.push(obs);
    }

    // Spawn gems
    nextGem -= dt;
    if (nextGem <= 0) {
      nextGem = GEM_INTERVAL + Math.random() * 0.5;
      spawnGem(-55);
    }

    // Move obstacles
    for (let i = activeObstacles.length - 1; i >= 0; i--) {
      const obs = activeObstacles[i];
      obs.position.z += curSpeed * dt;
      if (obs.userData.isRing) obs.rotation.z += dt * 1.5;

      if (obs.position.z > 12) {
        scene.remove(obs);
        activeObstacles.splice(i, 1);
        continue;
      }

      if (obs.position.z > playerGroup.position.z - 2 && obs.position.z < playerGroup.position.z + 1) {
        if (checkObstacleHit(obs)) { die(); }
      }
    }

    // Move gems
    for (let i = activeGems.length - 1; i >= 0; i--) {
      const gem = activeGems[i];
      gem.position.z += curSpeed * dt;
      gem.rotation.y += dt * 3;
      gem.rotation.x += dt * 2;

      if (gem.position.z > 12) {
        scene.remove(gem);
        activeGems.splice(i, 1);
        continue;
      }

      const gd = gem.position.distanceTo(playerGroup.position);
      if (gd < 0.8) {
        // Collect
        scene.remove(gem);
        activeGems.splice(i, 1);
        comboCount++;
        comboTimer = 2.5;
        if (comboCount > 1) {
          comboEl.textContent = `x${comboCount} COMBO!`;
          comboEl.style.opacity = '1';
          setTimeout(() => { comboEl.style.opacity = '0'; }, 800);
        }
      }
    }

    // Track scroll (cosmetic, move track back)
    track.position.z += curSpeed * dt;
    if (track.position.z > 10 + TRACK_LEN / 2) {
      track.position.z = -TRACK_LEN / 2 + 10;
    }

    // Camera shake
    if (shakeAmt > 0) {
      shakeAmt *= 0.85;
      camera.position.x = (Math.random()-0.5) * shakeAmt * 0.5;
      camera.position.y = 3.5 + (Math.random()-0.5) * shakeAmt * 0.3;
    } else {
      camera.position.x += (0 - camera.position.x) * dt * 5;
      camera.position.y += (3.5 - camera.position.y) * dt * 5;
    }

    // Invincibility flash
    if (invincible > 0) {
      bodyMat.emissiveIntensity = Math.sin(elapsed * 30) > 0 ? 1.5 : 0;
    } else {
      bodyMat.emissiveIntensity = 0.3;
    }

    // Purple light follow player (delayed)
    purpleLight.position.x += (playerGroup.position.x - purpleLight.position.x) * dt * 3;

    // Update best
    if (score > best) { best = score; bestEl.textContent = best; }
  }

  renderer.render(scene, camera);
}

animate();
</script>
