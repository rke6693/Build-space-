# ----------------------------------------------------------------------------
# Whatnot $1 Auction Sniper — configuration
# Copy to config.yaml and tweak to taste.
# ----------------------------------------------------------------------------

# Behaviour
dry_run: true              # If true, NEVER clicks the bid button. Just logs.
headless: false            # Keep the browser visible so you can intervene.
user_data_dir: ".profile"  # Persistent browser profile (stores your login).

# Targeting
max_start_price: 1.00      # Only snipe auctions that *started* at <= this.
max_bid: 5.00              # Hard ceiling. The bot will never bid above this.
min_bid_increment: 1.00    # Whatnot's typical increment.

# Snipe timing (seconds before the auction closes)
snipe_window_open: 1.8     # Start trying to bid when T-minus <= this.
snipe_window_close: 0.4    # Stop trying once we're closer than this
                           # (avoid sending a click after the lot closes).
poll_interval_ms: 120      # How often to re-scan the DOM.

# Streams to watch. The bot rotates through them looking for live $1 lots.
# You can pass `--stream <url>` on the command line to override.
streams:
  - "https://www.whatnot.com/live/"     # generic fallback — pick from listings
  # - "https://www.whatnot.com/live/<livestream-id>"

# DOM selectors. Whatnot changes its markup from time to time — if the bot
# stops seeing auctions, open devtools, find the new classes, and update these.
# Every selector is matched with Playwright's CSS engine.
selectors:
  # The live-auction "card" that appears on the right side of a stream.
  auction_root: '[data-testid="live-auction-card"], [class*="AuctionCard"]'
  # Current highest bid (text contains a $ amount).
  current_bid:  '[data-testid="current-bid"], [class*="currentBid"]'
  # Starting price, used to decide whether this is a "$1 auction".
  start_price:  '[data-testid="start-price"], [class*="startingBid"]'
  # Countdown / time remaining (text like "0:03" or "3s").
  time_left:    '[data-testid="auction-timer"], [class*="timer"]'
  # The clickable bid button.
  bid_button:   'button[data-testid="bid-button"], button:has-text("Place Bid"), button:has-text("Bid")'
  # Optional confirmation modal ("Yes, bid $X") — left blank to skip.
  confirm_button: 'button:has-text("Confirm"), button:has-text("Yes")'
