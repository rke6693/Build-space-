# ----------------------------------------------------------------------------
# Whatnot $1 Auction Sniper — configuration
# Copy to config.yaml and tweak to taste.
# ----------------------------------------------------------------------------

# ---- Behaviour --------------------------------------------------------------
dry_run: true              # If true, NEVER clicks the bid button. Just logs.
headless: false            # Keep the browser visible so you can intervene.
user_data_dir: ".profile"  # Persistent browser profile (stores your login).

# ---- Bidding ----------------------------------------------------------------
max_start_price: 1.00      # Only snipe auctions that *started* at <= this.
max_bid: 5.00              # Hard ceiling. The bot will never bid above this.
min_bid_increment: 1.00    # Whatnot's typical increment.

# ---- Snipe timing (seconds before the auction closes) ----------------------
snipe_window_open: 1.8     # Start trying to bid when T-minus <= this.
snipe_window_close: 0.4    # Stop trying once we're closer than this
                           # (avoid sending a click after the lot closes).
poll_interval_ms: 120      # How often each watcher re-scans the DOM.

# ---- Manually pinned streams ------------------------------------------------
# The bot always watches these (until they end / idle out). You can also
# pass --stream <url> on the command line, possibly several times.
streams: []
# - "https://www.whatnot.com/live/<livestream-id>"

# ---- Stream discovery -------------------------------------------------------
# Automatically widen the net by browsing Whatnot's live listings and
# spawning a watcher for every live stream the bot finds, up to `max_streams`.
discovery:
  enabled: true
  listing_urls:
    - "https://www.whatnot.com/live"
    # Add category pages here to bias toward what you collect, e.g.:
    # - "https://www.whatnot.com/category/sports-cards/live"
    # - "https://www.whatnot.com/category/pokemon/live"
    # - "https://www.whatnot.com/category/sneakers/live"
  max_streams: 5                    # Hard cap on parallel watchers.
  refresh_interval_seconds: 30      # How often to re-scrape the listings.
  idle_timeout_seconds: 60          # Watcher self-terminates if no auction
                                    # card is visible for this long.
  title_keywords: []                # If non-empty, stream title MUST match
                                    # at least one. e.g. ["pokemon", "tcg"].
  title_blocklist: []               # If a title contains any of these,
                                    # skip the stream.

# ---- DOM selectors ----------------------------------------------------------
# Whatnot changes its markup from time to time — if the bot stops seeing
# auctions or stops finding streams, open devtools, find the new classes,
# and update these.
selectors:
  # --- Per-stream page (live auction card) ---
  auction_root:    '[data-testid="live-auction-card"], [class*="AuctionCard"]'
  current_bid:     '[data-testid="current-bid"], [class*="currentBid"]'
  start_price:     '[data-testid="start-price"], [class*="startingBid"]'
  time_left:       '[data-testid="auction-timer"], [class*="timer"]'
  bid_button:      'button[data-testid="bid-button"], button:has-text("Place Bid"), button:has-text("Bid")'
  confirm_button:  'button:has-text("Confirm"), button:has-text("Yes")'
  # --- Listings page (discovery) ---
  livestream_link:  'a[href*="/live/"]'
  livestream_title: '[data-testid*="title"], h2, h3'
