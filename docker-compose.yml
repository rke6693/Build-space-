version: '3.9'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: omnisight
      POSTGRES_USER: omnisight
      POSTGRES_PASSWORD: omnisight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnisight"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Background workers for data ingestion
  worker:
    build: .
    command: python -m api.workers.ingest
    env_file:
      - .env
    depends_on:
      - api
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
