services:
  keel:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: keel:local
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://keel:keel@postgres:5432/keel
      PORT: "8787"
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: keel
      POSTGRES_PASSWORD: keel
      POSTGRES_DB: keel
    volumes:
      - keel_pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keel -d keel"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  keel_pgdata: {}
